name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Valid placeholders required by the application environment schema.
  NEXT_PUBLIC_API_BASE_URL: https://phimapi.com/
  NEXT_PUBLIC_FIREBASE_API_KEY: e2e-dummy-api-key
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: e2e-dummy.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: e2e-dummy
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: e2e-dummy.appspot.com
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "1234567890"
  NEXT_PUBLIC_FIREBASE_APP_ID: 1:1234567890:web:e2edummy
  NEXT_PUBLIC_FIREBASE_DATABASE_URL: https://e2e-dummy-default-rtdb.firebaseio.com

jobs:
  quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:run

  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: E2E smoke
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
