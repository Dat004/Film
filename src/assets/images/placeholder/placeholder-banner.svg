<svg width="1512" height="756" viewBox="0 0 1512 756" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Đang tải banner">
  <defs>
    <linearGradient id="bg-banner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1e"/>
      <stop offset="100%" stop-color="#0e0e11"/>
    </linearGradient>
    <linearGradient id="shimmer-banner" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2a30" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3d3d45" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2a2a30" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vignette-banner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <style>
      .shimmer-band { animation: shimmer-move 1.9s ease-in-out infinite; }
      @keyframes shimmer-move {
        0%   { transform: translateX(-40%); }
        100% { transform: translateX(40%); }
      }
      .pulse { animation: pulse-op 1.9s ease-in-out infinite; }
      @keyframes pulse-op {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1512" height="756" fill="url(#bg-banner)"/>

  <g class="shimmer-band">
    <rect x="-350" y="0" width="750" height="756" fill="url(#shimmer-banner)"/>
  </g>

  <rect width="1512" height="756" fill="url(#vignette-banner)"/>

  <!-- top-left badges mimicking FHD / Vietsub / rating -->
  <rect x="40" y="40" width="52" height="26" rx="5" fill="#232328"/>
  <rect x="100" y="40" width="150" height="26" rx="5" fill="#232328"/>
  <rect x="1420" y="40" width="52" height="26" rx="5" fill="#232328"/>

  <!-- center play glyph -->
  <g class="pulse" transform="translate(756,378)">
    <circle r="52" fill="none" stroke="#4a4a52" stroke-width="3.5"/>
    <path d="M-16,-25 L30,0 L-16,25 Z" fill="#4a4a52"/>
  </g>

  <!-- bottom-left title/meta bars -->
  <rect x="40" y="620" width="480" height="30" rx="7" fill="#2c2c33"/>
  <rect x="40" y="666" width="300" height="18" rx="5" fill="#232328"/>
  <rect x="40" y="698" width="180" height="18" rx="5" fill="#1e1e23"/>

  <!-- carousel dots bottom-right -->
  <g fill="#3a3a41">
    <circle cx="1380" cy="716" r="4"/>
    <circle cx="1400" cy="716" r="4"/>
    <circle cx="1420" cy="716" r="4"/>
    <rect x="1435" y="712" width="18" height="8" rx="4" fill="#5a5a63"/>
    <circle cx="1470" cy="716" r="4"/>
  </g>
</svg>
