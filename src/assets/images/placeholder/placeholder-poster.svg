<svg width="300" height="450" viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Đang tải poster">
  <defs>
    <linearGradient id="bg-poster" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c20"/>
      <stop offset="100%" stop-color="#101013"/>
    </linearGradient>
    <linearGradient id="shimmer-poster" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2f2f36" stop-opacity="0"/>
      <stop offset="50%" stop-color="#414149" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2f2f36" stop-opacity="0"/>
    </linearGradient>
    <style>
      .shimmer-band-v { animation: shimmer-move-v 1.8s ease-in-out infinite; }
      @keyframes shimmer-move-v {
        0%   { transform: translateY(-55%); }
        100% { transform: translateY(55%); }
      }
      .pulse { animation: pulse-op 1.8s ease-in-out infinite; }
      @keyframes pulse-op {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="300" height="450" rx="10" fill="url(#bg-poster)"/>

  <g class="shimmer-band-v">
    <rect x="0" y="-350" width="300" height="700" fill="url(#shimmer-poster)"/>
  </g>

  <!-- film icon -->
  <g class="pulse" transform="translate(150,205)">
    <rect x="-30" y="-24" width="60" height="48" rx="6" fill="none" stroke="#4a4a52" stroke-width="3"/>
    <circle cx="-14" cy="-8" r="3.2" fill="#4a4a52"/>
    <path d="M-8,4 L4,-6 L14,2 L24,-8" stroke="#4a4a52" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <rect x="30" y="392" width="240" height="14" rx="5" fill="#28282e"/>
  <rect x="30" y="416" width="150" height="12" rx="5" fill="#232328"/>

  <rect x="0" y="0" width="300" height="450" rx="10" fill="none" stroke="#232328" stroke-width="2"/>
</svg>
